```html
<!DOCTYPE html>
<html>
<head>
<title>Student Portal</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.header{
text-align:center;
color:white;
padding:25px;
}

.container{
width:520px;
margin:30px auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
margin:5px;
}

.green{background:#27ae60;}
.orange{background:#f39c12;}
.red{background:#e74c3c;}
.blue{background:#3498db;}

textarea{
width:100%;
height:70px;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.chatBox{
margin-top:20px;
background:#f4f6f9;
padding:12px;
border-radius:6px;
max-height:200px;
overflow:auto;
}

.msg{
background:#f1f3f6;
padding:10px;
margin-top:8px;
border-radius:6px;
border-left:4px solid #3498db;
}

</style>
</head>

<body>

<div class="header">

<h1>Silent Struggles</h1>

<p>Your doubts matter. Asking questions makes learning stronger.</p>

</div>

<div class="container">

<h3>Topic: Dijkstra Algorithm</h3>

<p>Select your understanding:</p>

<button class="green" onclick="vote('understood')">Understood</button>
<button class="orange" onclick="vote('partial')">Partially</button>
<button class="red" onclick="vote('not')">Not Understood</button>

<h3>Ask Doubt</h3>

<textarea id="doubtText"></textarea>

<br><br>

<button class="blue" onclick="submitDoubt()">Submit Doubt</button>

<button class="blue" onclick="resetData()">Reset</button>

<div class="chatBox" id="chat"></div>

</div>

<script>

let badWords=["idiot","stupid","dumb"];
let warningCount=0;

function vote(type){

let u=localStorage.getItem("understood")||0;
let p=localStorage.getItem("partial")||0;
let n=localStorage.getItem("not")||0;

if(type=="understood")u++;
if(type=="partial")p++;
if(type=="not")n++;

localStorage.setItem("understood",u);
localStorage.setItem("partial",p);
localStorage.setItem("not",n);

alert("Response recorded");

}

function submitDoubt(){

let text=document.getElementById("doubtText").value;

if(text==""){
alert("Write a doubt first");
return;
}

for(let w of badWords){

if(text.toLowerCase().includes(w)){

warningCount++;

if(warningCount==1){
alert("Warning: abusive language detected");
}

else{
alert("Blocked due to repeated abuse");
return;
}

return;

}

}

let doubts=JSON.parse(localStorage.getItem("doubts"))||[];

doubts.push(text);

localStorage.setItem("doubts",JSON.stringify(doubts));

localStorage.setItem("newDoubt","yes");

document.getElementById("doubtText").value="";

alert("Doubt submitted");

showChat();

}

function showChat(){

let chat=document.getElementById("chat");

let doubts=JSON.parse(localStorage.getItem("doubts"))||[];

chat.innerHTML="<b>Your Doubts:</b>";

doubts.forEach(d=>{
chat.innerHTML+="<div class='msg'>"+d+"</div>";
});

}

function resetData(){
localStorage.clear();
location.reload();
}

showChat();

</script>

</body>
</html>
```
